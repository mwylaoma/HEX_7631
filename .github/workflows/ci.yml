name: CI
on:
  push:
    branches: [master]
    paths-ignore: [README.md]
  pull_request:
    branches: [master]
    paths-ignore: [README.md]
defaults:
  run:
    shell: bash
jobs:
  lint:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on shell scripts
        run: |
          find . -name '*.sh' ! -path './.git/*' ! -path './src/third_party/*' ! -path './src/build/*' \
            -print0 | xargs -0 -r shellcheck --severity=error
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8 on Python scripts
        run: |
          find . -name '*.py' ! -path './.git/*' ! -path './src/*' \
            -print0 | xargs -0 -r flake8 --max-line-length=150
